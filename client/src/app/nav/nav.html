<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">Dating App</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarColor01">
        @if(accountService.currentUser$ | async) {
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                <a class="nav-link" routerLink="/members" routerLinkActive="active">Matches</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" routerLink="/lists" routerLinkActive="active">Lists</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" routerLink="/messages" routerLinkActive="active">Messages</a>
                </li>
                <li class="nav-item dropdown">
                <div ngbDropdown class="dropdown"  >
                    <a class="nav-link dropdown-toggle" ngbDropdownToggle>
                        Welcome {{ (accountService.currentUser$ | async)?.userName | titlecase }}
                    </a>
                    <ul class="dropdown-menu " ngbDropdownMenu  >
                        <li ><a class="dropdown-item" routerLink="/profile">Profile</a></li>
                        <li ><a class="dropdown-item" routerLink="/settings">Settings</a></li>
                        <li ><hr class="dropdown-divider"></li>
                        <li ><a class="dropdown-item" href="#" (click)="logout()">Logout</a></li>
                    </ul>
                </div>
                </li>
            </ul>
        }
        @else{
            <form #loginForm="ngForm" class="d-flex" (ngSubmit)="login()" autocomplete="off">
                <input name="username" [(ngModel)]="model.username" class="form-control me-2" type="text" placeholder="Username">
                <input name="password" [(ngModel)]="model.password" class="form-control me-2" type="password" placeholder="Password">
                <button class="btn btn-info my-2 my-sm-0" type="submit">Login</button> 
            </form>            
            
            <li class="nav-item">
                <a class="nav-link" routerLink="/errors" routerLinkActive="active">Errors</a>
            </li>
        }
      <!-- <form class="d-flex">
        <input class="form-control me-sm-2" type="search" placeholder="Search">
        <button class="btn btn-secondary my-2 my-sm-0" type="submit">Search</button>
      </form> -->
    </div>
  </div>
</nav>
