<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container">
         <a class="navbar-brand" href="#">Dating App</a>
            @if(loggedIn){
                <ul class="navbar-nav me-auto mb-2 mb-md-0" >
                    <li class="nav-item">
                        <a class="nav-link" href="#">Matches</a>  
                    </li>
                    <li class="nav-item"> 
                        <a class="nav-link" href="#">Lists</a> 
                    </li> 
                    <li class="nav-item">
                        <a class="nav-link" href="#">Messages</a>  
                    </li>
                </ul> 
                <div ngbDropdown class="dropdown" >
                    <a class="dropdown-toggle text-light" ngbDropdownToggle>Welcome User</a>
                    <ul class="dropdown-menu mt-3" ngbDropdownMenu >
                        <li ngbDropdownItem><a class="dropdown-item" href="#">Profile</a></li>
                        <li ngbDropdownItem><a class="dropdown-item" href="#">Settings</a></li>
                        <li ngbDropdownItem><hr class="dropdown-divider"></li>
                        <li ngbDropdownItem><a class="dropdown-item" href="#" (click)="logout()">Logout</a></li>
                    </ul>
                </div>

            }
            @else{
                    <form #loginForm="ngForm" class="d-flex" (ngSubmit)="login()" autocomplete="off">
                        <input name="username" [(ngModel)]="model.username" class="form-control me-2" type="text" placeholder="Username">
                        <input name="password" [(ngModel)]="model.password" class="form-control me-2" type="password" placeholder="Password">
                        <button class="btn btn-outline-success" type="submit">Login</button> 
                    </form>            

            }
    </div>
